name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy static site to Netlify (no build step)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend/ directly to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: "./frontend"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }} via GitHub Actions (no build)"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Confirm deployment
        run: |
          echo "TipSplit deployed to Netlify production."
          echo "No build command was executed - static frontend/ assets published as-is."
